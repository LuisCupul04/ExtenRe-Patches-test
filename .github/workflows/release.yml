name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Release
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    # 🔑 Variables de entorno a nivel de job para que estén disponibles en todos los pasos
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}
      # Si tu proyecto necesita GPG para firmar commits/tags
      GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Cache Gradle
        uses: burrunan/gradle-cache-action@v3

      - name: Get the version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^version=.*/version=${{ steps.get_version.outputs.VERSION }}/" gradle.properties

      - name: Build and generate patches
        run: |
          # Gradle ahora tiene acceso a GITHUB_ACTOR y GITHUB_TOKEN
          ./gradlew :extensions:shared:syncExtension \
                    :extensions:spoof-signature:syncExtension \
                    :extensions:spoof-wifi:syncExtension \
                    :patches:jar \
                    generatePatchesFiles

      - name: Setup Node.js (opcional)
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          cache: 'npm'

      - name: Install dependencies (si las necesitas)
        run: npm install

      - name: Import GPG key (opcional, para firmar)
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ vars.GPG_FINGERPRINT }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_tag_gpgsign: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            patches/build/libs/*.EXRE
            patches-exre.json
        env:
          GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}

      - name: Publish to GitHub Packages (si es necesario)
        run: ./gradlew :patches:publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}
