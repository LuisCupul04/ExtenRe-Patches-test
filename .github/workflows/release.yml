name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev

env:
  # Elimina la advertencia de Node.js 20 en acciones
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    permissions:
      contents: write
      packages: write   # Necesario si publicas en GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      # Usamos la acción oficial de Gradle (cache automático)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      ### NUEVO PASO 1: Publicar el módulo shared en Maven Local ###
      - name: Publish shared module to Maven Local
        env:
          GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}  # Necesario para resolver dependencias de GitHub Packages
        run: ./gradlew :extensions:shared:publishToMavenLocal

      ### NUEVO PASO 2: Generar los parches (ahora con shared disponible localmente) ###
      - name: Build patches
        env:
          GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}
        run: |
          ./gradlew clean generatePatchesFiles --no-configuration-cache \
            -x :extensions:spoof-signature:syncExtension \
            -x :extensions:spoof-wifi:syncExtension

      # Opcional: Publicar en GitHub Packages (solo en master)
      # - name: Publish to GitHub Packages
      #   if: github.ref == 'refs/heads/master'
      #   env:
      #     GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}
      #   run: ./gradlew publish

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          fingerprint: ${{ vars.GPG_FINGERPRINT }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}
        run: npm exec semantic-release

      # Subir el archivo .EXRE a la release (solo en master)
      - name: Upload EXRE to Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          files: patches/build/libs/*.EXRE
        env:
          GITHUB_TOKEN: ${{ secrets.EXTEN_TOKEN }}